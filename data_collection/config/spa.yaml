repo_id: "amanuelbyte/african_speech_dataset_spa"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

# Total target: ~70,000+ samples
#   common_voice_11           30,000   (crowd-sourced, reliable)
#   multilingual_librispeech  15,000   (audiobook)
#   speech_massive            10,000   (NLU speech)
#   mediaspeech               10,000   (broadcast news)
#   sib_fleurs                 5,000   (diverse topics)
#   minds14                   10,000   (intent classification)
#                           --------
#                             80,000

datasets:

  # -----------------------------------------------
  # Common Voice 11 (Mozilla Foundation) — crowd-sourced, RELIABLE
  # -----------------------------------------------
  - name: common_voice_11_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: mozilla-foundation/common_voice_11_0
    subset: es
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence
    max_samples: 30000

  # -----------------------------------------------
  # Multilingual LibriSpeech (Facebook) — audiobook
  # -----------------------------------------------
  - name: multilingual_librispeech_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: facebook/multilingual_librispeech
    subset: spanish
    split: "train"
    audio_col: audio
    text_col: transcript
    max_samples: 15000

  # -----------------------------------------------
  # VoxPopuli (Facebook) — EU Parliament speech
  # -----------------------------------------------
  - name: voxpopuli_spa
    enabled: false   # DISABLED: incredibly slow to stream/download 10 large parquet shards
    source: hf
    language: spa_Latn
    hf_path: facebook/voxpopuli
    subset: es
    split: "train"
    audio_col: audio
    text_col: normalized_text
    max_samples: 10000

  # -----------------------------------------------
  # Speech-MASSIVE (FBK-MT) — NLU speech data
  # -----------------------------------------------
  - name: speech_massive_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: FBK-MT/Speech-MASSIVE
    subset: es-ES
    split: "train+validation+test"
    audio_col: audio
    text_col: utt
    max_samples: 10000

  # -----------------------------------------------
  # MediaSpeech — broadcast news
  # -----------------------------------------------
  - name: mediaspeech_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: ymoslem/MediaSpeech
    subset: es
    split: "train"
    audio_col: audio
    text_col: sentence
    max_samples: 10000

  # -----------------------------------------------
  # SIB-FLEURS — diverse topics
  # -----------------------------------------------
  - name: sib_fleurs_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: WueNLP/sib-fleurs
    subset: spa_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription
    max_samples: 5000

  # -----------------------------------------------
  # MINDS-14 (PolyAI) — intent classification speech
  # -----------------------------------------------
  - name: minds14_spa
    enabled: true
    source: hf
    language: spa_Latn
    hf_path: PolyAI/minds14
    subset: es-ES
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 10000
