repo_id: "amanuelbyte/african_speech_dataset_new_uncleaned"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: sib_fleurs_yor
    enabled: false   # subset yor_Latn not found in sib-fleurs
    source: hf
    language: yor
    hf_path: WueNLP/sib-fleurs
    subset: yor_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: common_voice_yor
    enabled: false   # subset 'yo' not found in common_voice_17_0
    source: hf
    language: yor
    hf_path: mozilla-foundation/common_voice_17_0
    subset: yo
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence

  - name: yoruba_parallel_michsethowusu
    enabled: true
    source: hf
    language: yor
    hf_path: michsethowusu/yoruba-speech-text-parallel
    split: "train"
    audio_col: audio
    text_col: text

  - name: idowuadams_yoruba_audio
    enabled: true
    source: hf
    language: yor
    hf_path: idowu-adams/Yoruba_Audio
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: benjaminogbonna_nigerian_cv_yoruba
    enabled: true
    source: hf
    language: yor
    hf_path: benjaminogbonna/nigerian_common_voice_dataset
    subset: yoruba
    split: "train"
    audio_col: audio
    text_col: sentence

  - name: zoelaenskii_zinny_yor_asr
    enabled: true
    source: hf
    language: yor
    hf_path: zoelaenskii/zinny
    subset: yor_asr
    split: "train+validation+test"
    audio_col: audio
    text_col: transcription

  - name: zoelaenskii_zinny_yor_tts
    enabled: true
    source: hf
    language: yor
    hf_path: zoelaenskii/zinny
    subset: yor_tts
    split: "train+validation+test"
    audio_col: audio
    text_col: text

  - name: common_voice_mozilla_24_yor
    enabled: true
    source: mozilla_cv
    language: yor
    moz_dataset_id: "cmj8u3q2500v5nxxb6xfa6jn5"
    cv_folder: "yo"
    audio_col: audio
    text_col: text
