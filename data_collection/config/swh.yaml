repo_id: "amanuelbyte/african_speech_dataset_swh"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: sib_fleurs_swh
    enabled: true
    source: hf
    language: swh
    hf_path: WueNLP/sib-fleurs
    subset: swh_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: zoelaenskii_zinny_swa_asr
    enabled: true
    source: hf
    language: swh
    hf_path: zoelaenskii/zinny
    subset: swa_asr
    split: "train+validation+test"
    audio_col: audio
    text_col: transcription

  - name: zoelaenskii_zinny_swa_tts
    enabled: true
    source: hf
    language: swh
    hf_path: zoelaenskii/zinny
    subset: swa_tts
    split: "train+validation+test"
    audio_col: audio
    text_col: text

  - name: common_voice_swh
    enabled: false   # subset 'sw' not found in common_voice_17_0
    source: hf
    language: swh
    hf_path: mozilla-foundation/common_voice_17_0
    subset: sw
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence

  - name: swahili_parallel_michsethowusu
    enabled: true
    source: hf
    language: swh
    hf_path: michsethowusu/swahili-words-speech-text-parallel
    split: "train"
    audio_col: audio
    text_col: text

  - name: swahili_speech_400hr_badrex
    enabled: false   # no splits loaded — dataset may be unavailable
    source: hf
    language: swh
    hf_path: badrex/swahili-speech-400hr
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: common_voice_mozilla_24_swh
    enabled: true
    source: mozilla_cv
    language: swh
    moz_dataset_id: "cmj8u3puq00qhnxxbg26y0owu"
    cv_folder: "sw"
    audio_col: audio
    text_col: text
