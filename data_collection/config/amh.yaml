repo_id: "amanuelbyte/african_speech_dataset_new_uncleaned"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: sib_fleurs_amh
    enabled: true
    source: hf
    language: amh
    hf_path: WueNLP/sib-fleurs
    subset: amh_Ethi
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: common_voice_amh
    enabled: false   # subset 'am' not found in common_voice_17_0; use mozilla_cv_24 instead
    source: hf
    language: amh
    hf_path: mozilla-foundation/common_voice_17_0
    subset: am
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence

  - name: amharic_speech_badrex
    enabled: true
    source: hf
    language: amh
    hf_path: badrex/amharic-speech
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: amharic_110h_kyagaba
    enabled: true
    source: hf
    language: amh
    hf_path: KYAGABA/amharic-speech-dataset-110HRS-V21
    split: "train"
    audio_col: audio
    text_col: text

  - name: kyagaba_combined_amharic_speech_dataset
    enabled: true
    source: hf
    language: amh
    hf_path: KYAGABA/combined_amharic_speech_dataset
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: common_voice_mozilla_24_amh
    enabled: true
    source: mozilla_cv
    language: amh
    moz_dataset_id: "cmj8u3ort000lnxxbp7q3icgp"
    cv_folder: "am"
    audio_col: audio
    text_col: text
