repo_id: "amanuelbyte/african_speech_dataset_por"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

# Total target: ~60,000 samples across 6 sources
#   multilingual_librispeech  20,000
#   speech_massive            10,000
#   mosel                     15,000
#   sib_fleurs                 5,000
#   belebele_fleurs            5,000
#   minds14                   15,000
#                           --------
#                             70,000

datasets:

  # -----------------------------------------------
  # Multilingual LibriSpeech (Facebook) — audiobook
  # -----------------------------------------------
  - name: multilingual_librispeech_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: facebook/multilingual_librispeech
    subset: portuguese
    split: "train"
    audio_col: audio
    text_col: transcript
    max_samples: 20000

  # -----------------------------------------------
  # Speech-MASSIVE (FBK-MT) — NLU speech data
  # -----------------------------------------------
  - name: speech_massive_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: FBK-MT/Speech-MASSIVE
    subset: pt-PT
    split: "train+validation+test"
    audio_col: audio
    text_col: utt
    max_samples: 10000

  # -----------------------------------------------
  # MOSEL (FBK-MT) — speech translation data
  # -----------------------------------------------
  - name: mosel_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: FBK-MT/mosel
    subset: pt
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 15000

  # -----------------------------------------------
  # SIB-FLEURS — diverse topics
  # -----------------------------------------------
  - name: sib_fleurs_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: WueNLP/sib-fleurs
    subset: por_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription
    max_samples: 5000

  # -----------------------------------------------
  # Belebele-FLEURS — diverse topics
  # -----------------------------------------------
  - name: belebele_fleurs_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: WueNLP/belebele-fleurs
    subset: por_Latn
    split: "train+test"
    audio_col: audio
    text_col: transcription
    max_samples: 5000

  # -----------------------------------------------
  # mTEDx Portuguese-BR — DISABLED: 219 shards ~80GB download for 10k samples
  # -----------------------------------------------
  - name: mtedx_ptbr
    enabled: false   # DISABLED: 219 parquet shards = ~80GB download, not worth it
    source: hf
    language: por_Latn
    hf_path: dominguesm/mTEDx-ptbr
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 10000

  # -----------------------------------------------
  # MINDS-14 (PolyAI) — intent classification speech
  # -----------------------------------------------
  - name: minds14_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: PolyAI/minds14
    subset: pt-PT
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 15000

  # -----------------------------------------------
  # Mozilla CV 24 — disabled until MOZ_API_KEY set
  # -----------------------------------------------
  - name: common_voice_mozilla_24_por
    enabled: false
    source: mozilla_cv
    language: por_Latn
    moz_dataset_id: "REPLACE_WITH_MOZ_DATASET_ID_FOR_PORTUGUESE"
    cv_folder: "pt"
    audio_col: audio
    text_col: text
