repo_id: "amanuelbyte/african_speech_dataset_por"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

# Total target: ~70,000 samples
#   multilingual_librispeech  70,000   (audiobook, reliable)
#   speech_massive             2,033   (small but clean)
#   sib_fleurs                   795   (small but clean)
#   minds14                      521   (tiny for pt-PT)
#                           --------
#                            ~73,000+

datasets:

  # -----------------------------------------------
  # Multilingual LibriSpeech (Facebook) — audiobook
  # -----------------------------------------------
  - name: multilingual_librispeech_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: facebook/multilingual_librispeech
    subset: portuguese
    split: "train"
    audio_col: audio
    text_col: transcript
    max_samples: 70000

  # -----------------------------------------------
  # CORAA v1.1 — Brazilian Portuguese (402k rows available)
  # -----------------------------------------------
  - name: coraa_v1_por
    enabled: false   # DISABLED: the dataset loader hangs on its extremely long text fields
    source: hf
    language: por_Latn
    hf_path: Racoci/CORAA-v1.1
    split: "train"
    audio_col: audio
    text_col: text
    max_samples: 20000

  # -----------------------------------------------
  # Speech-MASSIVE (FBK-MT) — NLU speech data
  # -----------------------------------------------
  - name: speech_massive_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: FBK-MT/Speech-MASSIVE
    subset: pt-PT
    split: "train+validation+test"
    audio_col: audio
    text_col: utt
    max_samples: 15000

  # -----------------------------------------------
  # SIB-FLEURS — diverse topics
  # -----------------------------------------------
  - name: sib_fleurs_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: WueNLP/sib-fleurs
    subset: por_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription
    max_samples: 5000

  # -----------------------------------------------
  # MINDS-14 (PolyAI)
  # -----------------------------------------------
  - name: minds14_por
    enabled: true
    source: hf
    language: por_Latn
    hf_path: PolyAI/minds14
    subset: pt-PT
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 15000
