repo_id: "amanuelbyte/african_speech_dataset_arb"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: common_voice_18_arabic_rashad
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: MohamedRashad/common-voice-18-arabic
    split: "train"
    audio_col: audio
    text_col: sentence
    max_samples: 200000

  - name: masc_arabic
    enabled: false   # DISABLED: 400 shards x 440MB each = ~170GB download, way too slow
    source: hf
    language: arb_Arab
    hf_path: MohamedRashad/MASC-Arabic
    split: "train"
    audio_col: audio
    text_col: text
    max_samples: 100000

  - name: tarteel_everyayah
    enabled: false   # DISABLED: 132 shards = ~90GB download.
    source: hf
    language: arb_Arab
    hf_path: tarteel-ai/everyayah
    split: "train"
    audio_col: audio
    text_col: text
    max_samples: 100000

  - name: speech_massive_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: FBK-MT/Speech-MASSIVE
    subset: ar-SA
    split: "train+validation+test"
    audio_col: audio
    text_col: utt
    max_samples: 50000
