repo_id: "amanuelbyte/african_speech_dataset_arb"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

# Total target: ~70,000+ samples
#   common_voice_18_arabic    20,000   (crowd-sourced)
#   speech_massive            10,000   (NLU speech)
#   mediaspeech               10,000   (broadcast news)
#   sib_fleurs                 5,000   (diverse topics)
#   google_svq                10,000   (speech)
#   linto_tunisian            10,000   (Tunisian Arabic)
#   floras                     5,000   (speech data)
#                           --------
#                             70,000

datasets:

  # -----------------------------------------------
  # Common Voice 18 Arabic (MohamedRashad)
  # -----------------------------------------------
  - name: common_voice_18_arabic_rashad
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: MohamedRashad/common-voice-18-arabic
    split: "train"
    audio_col: audio
    text_col: sentence
    max_samples: 20000

  # -----------------------------------------------
  # Speech-MASSIVE (FBK-MT) — NLU speech data
  # -----------------------------------------------
  - name: speech_massive_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: FBK-MT/Speech-MASSIVE
    subset: ar-SA
    split: "train+validation+test"
    audio_col: audio
    text_col: utt
    max_samples: 10000

  # -----------------------------------------------
  # MediaSpeech — broadcast news Arabic
  # -----------------------------------------------
  - name: mediaspeech_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: ymoslem/MediaSpeech
    subset: ar
    split: "train"
    audio_col: audio
    text_col: sentence
    max_samples: 10000

  # -----------------------------------------------
  # SIB-FLEURS — diverse topics
  # -----------------------------------------------
  - name: sib_fleurs_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: WueNLP/sib-fleurs
    subset: arb_Arab
    split: "train+validation"
    audio_col: audio
    text_col: transcription
    max_samples: 5000

  # -----------------------------------------------
  # Google SVQ — speech data
  # -----------------------------------------------
  - name: google_svq_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: google/svq
    subset: ar
    split: "train"
    audio_col: audio
    text_col: text
    max_samples: 10000

  # -----------------------------------------------
  # LinTO Tunisian Arabic — conversational
  # -----------------------------------------------
  - name: linto_tunisian_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: linagora/linto-dataset-audio-ar-tn
    split: "train"
    audio_col: audio
    text_col: text
    max_samples: 10000

  # -----------------------------------------------
  # FLORAS (espnet) — speech data
  # -----------------------------------------------
  - name: floras_arb
    enabled: true
    source: hf
    language: arb_Arab
    hf_path: espnet/floras
    subset: ara
    split: "train"
    audio_col: audio
    text_col: transcription
    max_samples: 5000
