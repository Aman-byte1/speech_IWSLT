repo_id: "amanuelbyte/african_speech_dataset_som"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: sib_fleurs_som
    enabled: true
    source: hf
    language: som
    hf_path: WueNLP/sib-fleurs
    subset: som_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: common_voice_som
    enabled: false   # subset 'so' not found in common_voice_17_0
    source: hf
    language: som
    hf_path: mozilla-foundation/common_voice_17_0
    subset: so
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence

  - name: somali_asr_skydheere
    enabled: true
    source: hf
    language: som
    hf_path: skydheere/soomali-asr-dataset
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: somali_tts_datasets
    enabled: true
    source: hf
    language: som
    hf_path: Somali-tts/somali-tts-datasets
    split: "train"
    audio_col: audio
    text_col: text

  - name: shunyalabs_somali_speech_dataset
    enabled: true
    source: hf
    language: som
    hf_path: shunyalabs/somali-speech-dataset
    split: "train+validation+test"
    audio_col: audio
    text_col: transcript

  - name: badrex_afri_voices_somali_speech
    enabled: true
    source: hf
    language: som
    hf_path: badrex/afri-voices-somali-speech
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: skydheere_soomali_asr
    enabled: true
    source: hf
    language: som
    hf_path: skydheere/soomali-asr-dataset
    split: "train"
    audio_col: audio
    text_col: transcription
