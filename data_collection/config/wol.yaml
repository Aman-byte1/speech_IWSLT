repo_id: "amanuelbyte/african_speech_dataset_new_uncleaned"
hf_token: null           # set via: export HF_TOKEN=hf_xxx (recommended)
moz_api_key: null        # set via: export MOZ_API_KEY=... (or set here)

data_dir: "./processed_data"
num_proc: 2
push_max_shard_size: "500MB"

audio:
  sampling_rate: 16000
  min_duration: 0.5
  max_duration: 30.0
  filter_by_duration: true   # duration is computed from headers/bytes (no torchcodec)

text:
  min_chars: 2
  max_chars: 500
  lowercase: true

datasets:
  - name: sib_fleurs_wol
    enabled: false   # subset wol_Latn not found in sib-fleurs
    source: hf
    language: wol
    hf_path: WueNLP/sib-fleurs
    subset: wol_Latn
    split: "train+validation"
    audio_col: audio
    text_col: transcription

  - name: common_voice_wol
    enabled: false   # subset 'wo' not found in common_voice_17_0
    source: hf
    language: wol
    hf_path: mozilla-foundation/common_voice_17_0
    subset: wo
    split: "train+validation+test"
    audio_col: audio
    text_col: sentence

  - name: alffa_wolof_isma
    enabled: false   # no splits loaded — dataset unavailable
    source: hf
    language: wol
    hf_path: Isma/alffa_wolof
    split: "train+dev"
    audio_col: audio
    text_col: transcription

  - name: wolof_tts_anta_women
    enabled: true
    source: hf
    language: wol
    hf_path: galsenai/anta_women_tts
    split: "train"
    audio_col: audio
    text_col: text

  - name: vonewman_wolof_audio_data
    enabled: false   # no splits loaded — dataset unavailable
    source: hf
    language: wol
    hf_path: vonewman/wolof-audio-data
    split: "train+test"
    audio_col: audio
    text_col: sentence

  - name: indabax_asr_wolof
    enabled: true
    source: hf
    language: wol
    hf_path: IndabaxSenegal/asr-wolof-dataset
    split: "train"
    audio_col: audio
    text_col: text

  - name: vonewman_fleurs_wolof
    enabled: true
    source: hf
    language: wol
    hf_path: vonewman/fleurs-wolof-dataset
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: ngia_asr_wolof_processed_with_ns
    enabled: true
    source: hf
    language: wol
    hf_path: ngia/asr-wolof-dataset-processed-with-NS
    split: "train"
    audio_col: audio
    text_col: text

  - name: moustapha91_wolof_tts
    enabled: true
    source: hf
    language: wol
    hf_path: Moustapha91/wolof-tts-dataset
    split: "train"
    audio_col: audio
    text_col: transcription

  - name: yigagilbert_alffa_wolof_19hr
    enabled: true
    source: hf
    language: wol
    hf_path: yigagilbert/alffa-wolof-asr-dataset-19hr
    split: "train"
    audio_col: audio
    text_col: transcription
