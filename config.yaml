# Data Pipeline Configuration for Low-Resource Speech Translation

# Hugging Face Settings
hf_token: "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" # User provided token
output_org: "amanuelbyte" # User provided usernameion/user

# Processing Parameters
audio:
  sampling_rate: 16000
  mono: true
  min_duration: 1.0
  max_duration: 20.0
  trim_silence: true
  top_db: 20

text:
  min_chars: 3
  max_chars: 300
  max_ratio: 2.5
  semantic_threshold: 0.6

# Models
models:
  semantic_model: "sentence-transformers/LaBSE" # Good for multilingual/African languages

# Dataset Registry
datasets:
  # --- HORN OF AFRICA (Amharic, Somali) ---
  - name: "Fleurs_Amharic"
    language: "amharic"
    hf_path: "WueNLP/sib-fleurs"
    subset: "amh_Ethi" 
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train+validation"

  - name: "Amharic_Speech_Badrex"
    language: "amharic"
    hf_path: "badrex/amharic-speech"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  - name: "Amharic_110H_Kyagaba"
    language: "amharic"
    hf_path: "KYAGABA/amharic-speech-dataset-110HRS-V21"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train"

  - name: "Fleurs_Somali"
    language: "somali"
    hf_path: "WueNLP/sib-fleurs"
    subset: "som_Som"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train+validation"

  - name: "Somali_ASR_Skydheere"
    language: "somali"
    hf_path: "skydheere/soomali-asr-dataset"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  # --- EAST AFRICA (Swahili) ---
  - name: "WAXAL_Swahili"
    language: "swahili"
    hf_path: "google/WaxalNLP"
    subset: "swa_tts"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  - name: "ALFFA_Swahili"
    language: "swahili"
    hf_path: "Isma/alffa_swahili"
    type: "voice"
    voice_col: "audio"
    text_col: "sentence"
    split: "train"

  - name: "Swahili_Parallel"
    language: "swahili"
    hf_path: "michsethowusu/swahili-words-speech-text-parallel"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  # --- WEST & CENTRAL AFRICA (Hausa, Yoruba, Lingala, Wolof) ---
