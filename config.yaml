# =============================================================================
# African Speech Data Pipeline Configuration
# =============================================================================
# Supported Languages: Amharic (amh), Somali (som), Hausa (hau), Swahili (swh),
#                     Yoruba (yor), Zulu (zul), Wolof (wol)
# =============================================================================

# HuggingFace Settings
hf_token: "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"
output_org: "amanuelbyte"
output_dir: "./processed_data"

# Processing Parameters
audio:
  sampling_rate: 16000
  mono: true
  min_duration: 1.0
  max_duration: 30.0
  trim_silence: true
  top_db: 20

text:
  min_chars: 3
  max_chars: 300
  max_ratio: 2.5
  semantic_threshold: 0.6

# Models
models:
  semantic_model: "sentence-transformers/LaBSE"

# =============================================================================
# DATASET REGISTRY
# =============================================================================

datasets:

  # ============================================================================
  # AMHARIC (amh) - Ethiopian Semitic Language
  # ============================================================================
  - name: "Fleurs_Amharic"
    language: "amh"
    hf_path: "WueNLP/sib-fleurs"
    subset: "amh_Ethi"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train+validation"

  - name: "Amharic_Speech_Badrex"
    language: "amh"
    hf_path: "badrex/amharic-speech"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train"

  - name: "Amharic_110H_Kyagaba"
    language: "amh"
    hf_path: "KYAGABA/amharic-speech-dataset-110HRS-V21"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  - name: "Amharic_ASR_MDeb"
    language: "amh"
    hf_path: "MDeb/amharic-asr"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  - name: "OpenSpeechAmharic"
    language: "amh"
    hf_path: "CAUVeC/open-speech-corpus"
    subset: "amh"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  # ============================================================================
  # SOMALI (som) - East Cushitic Language
  # ============================================================================
  - name: "Fleurs_Somali"
    language: "som"
    hf_path: "WueNLP/sib-fleurs"
    subset: "som_Som"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train+validation"

  - name: "Somali_ASR_Skydheere"
    language: "som"
    hf_path: "skydheere/soomali-asr-dataset"
    type: "voice"
    voice_col: "audio"
    text_col: "text"
    split: "train"

  - name: "Somali_Speech_Kaggle"
    language: "som"
    hf_path: "mikehankey/somali-speech"
    type: "voice"
    voice_col: "audio"
    text_col: "transcription"
    split: "train"

  - name: "Somali_CommonVoice"
    language: "som"
    hf_path: "mozilla-foundation/common_voice_16_1"
    subset: "so"
    type: "voice"
    voice_col: "audio"
    text_col: "sentence"
    split: "train"

  # ============================================================================
  # HAUSA (hau) - Chadic Language (West Africa)
